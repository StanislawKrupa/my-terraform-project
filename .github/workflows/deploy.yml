name: CI/CD Terraform Pipeline

on:
  push:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # --- LINT ---
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
     philanthropy:
    - name: Install Lint & Test tools
      run: |
        pip install flake8 pytest moto boto3

    - name: Run Python Lint (flake8)
      run: flake8 functions/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Terraform Format Check
      uses: hashicorp/setup-terraform@v2
    - run: terraform fmt -check

    # --- TEST (użycie biblioteki moto do mockowania AWS) ---
    - name: Run Unit Tests
      run: pytest functions/

  terraform-pipeline:
    needs: lint-and-test
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }} # Bezpieczne przekazanie sekretu do TF
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: actions/setup-terraform@v2
      with:
        terraform_version: 1.5.0

    - name: Terraform Init
      run: terraform init

    # --- TERRAFORM PLAN ---
    - name: Terraform Plan
      run: terraform plan

    # --- TERRAFORM APPLY (tylko przy push do main) ---
    - name: Terraform Apply
      if: github.ref == 'refs/heads/main'
      run: terraform apply -auto-approve